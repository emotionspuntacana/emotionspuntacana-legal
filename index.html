html<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok for Developers | Creator & Business API Ecosystem</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        :root {
            --bg-primary: #121212;
            --bg-secondary: #1f1f1f;
            --bg-card: #2f2f2f;
            --text-main: #ffffff;
            --text-muted: #a6a6a6;
            --tt-cyan: #00f2fe;
            --tt-pink: #fe0979;
            --accent: #25f4ee;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* Header & Navigation */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: -0.5px;
        }

        .logo-box {
            background: linear-gradient(45deg, var(--tt-pink), var(--tt-cyan));
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover, nav a.active {
            color: var(--text-main);
        }

        .nav-btns {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .btn {
            padding: 0.5rem 1.2rem;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-text {
            color: var(--text-main);
        }

        .btn-primary {
            background-color: var(--text-main);
            color: var(--bg-primary);
            border: none;
        }

        .btn-primary:hover {
            background-color: #e6e6e6;
        }

        /* Hero Section */
        .hero {
            padding: 10rem 2rem 6rem;
            text-align: center;
            background: radial-gradient(circle at top right, rgba(0,242,254,0.07), transparent 40%),
                        radial-gradient(circle at top left, rgba(254,9,121,0.07), transparent 40%);
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            letter-spacing: -1px;
        }

        .hero h1 span {
            background: linear-gradient(90deg, var(--tt-cyan), var(--tt-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto 2.5rem;
        }

        .hero-btns {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .btn-large {
            padding: 0.8rem 2rem;
            font-size: 1rem;
            border-radius: 6px;
        }

        .btn-outline {
            background: transparent;
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-outline:hover {
            border-color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Content Container */
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Section Title */
        .section-title {
            margin-bottom: 3rem;
            text-align: center;
        }

        .section-title h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .section-title p {
            color: var(--text-muted);
        }

        /* Product Cards Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 6rem;
        }

        .card {
            background-color: var(--bg-secondary);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 2rem;
            transition: transform 0.3s, border-color 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(255,255,255,0.15);
        }

        .card-icon {
            width: 48px;
            height: 48px;
            background-color: rgba(255,255,255,0.05);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            color: var(--accent);
        }

        .card h3 {
            font-size: 1.25rem;
            margin-bottom: 0.75rem;
        }

        .card p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }

        .card-link {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .card-link:hover {
            text-decoration: underline;
        }

        /* Documentation & Sandbox Tabs */
        .doc-section {
            background-color: var(--bg-secondary);
            border-radius: 16px;
            padding: 3rem;
            margin-bottom: 6rem;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 600;
            padding-bottom: 1rem;
            cursor: pointer;
            position: relative;
        }

        .tab-btn.active {
            color: var(--text-main);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--tt-cyan), var(--tt-pink));
        }

        .tab-content {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
        }

        .tab-content.active {
            display: grid;
        }

        .tab-text h3 {
            font-size: 1.75rem;
            margin-bottom: 1rem;
        }

        .tab-text p {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .code-block {
            background-color: var(--bg-primary);
            border-radius: 8px;
            padding: 1.5rem;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            color: #39ec9b;
            border: 1px solid rgba(255,255,255,0.05);
            overflow-x: auto;
        }

        .code-block span.keyword { color: #f92672; }
        .code-block span.string { color: #e6db74; }
        .code-block span.comment { color: #75715e; }

        /* Footer */
        footer {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4rem 2rem;
            background-color: var(--bg-secondary);
        }

        .footer-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
        }

        .footer-col h4 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
            color: var(--text-muted);
        }

        .footer-col ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .footer-col a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .footer-col a:hover {
            color: var(--text-main);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            nav, .nav-btns .btn-text { display: none; }
            .hero h1 { font-size: 2.5rem; }
            .tab-content { grid-template-columns: 1fr; gap: 2rem; }
            .doc-section { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="nav-container">
            <div class="logo-section">
